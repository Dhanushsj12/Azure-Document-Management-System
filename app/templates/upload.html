{% extends "layout.html" %}

{% block title %}

Upload Document

{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-lg-6">

<div class="card">

<div class="card-header">
    <i class="bi bi-cloud-upload-fill"></i> Upload Document
</div>

<div class="card-body">

<form method="POST"

      enctype="multipart/form-data">

<div class="upload-drop mb-3">

<i class="bi bi-cloud-arrow-up"></i>

<label class="form-label d-block mb-2">

Choose File

</label>

<input

type="file"

name="document"

class="form-control"

required

>

</div>

<button

class="btn btn-primary">

<i class="bi bi-upload"></i> Upload

</button>

<a href="{{ url_for('document.documents') }}"
   class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
