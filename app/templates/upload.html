{% extends "layout.html" %}

{% block title %}

Upload Document

{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-lg-6">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>

Upload Document

</h3>

</div>

<div class="card-body">

<form method="POST"

      enctype="multipart/form-data">

<div class="mb-3">

<label class="form-label">

Choose File

</label>

<input

type="file"

name="document"

class="form-control"

required

>

</div>

<button

class="btn btn-primary">

Upload

</button>

<a

href="{{ url_for('document.documents') }}"

class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
