<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Document Management System{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="app-shell">

    <aside class="sidebar" id="sidebar">

        <div class="sidebar-brand">
            <i class="bi bi-archive-fill"></i>
            <span>Document Vault</span>
        </div>

        <nav class="sidebar-nav">

            <div class="sidebar-section-label">Workspace</div>

            <a href="{{ url_for('dashboard.dashboard') }}"
               class="nav-item {% if request.endpoint == 'dashboard.dashboard' %}active{% endif %}">
                <i class="bi bi-grid-1x2-fill"></i>
                <span>Dashboard</span>
            </a>

            <a href="{{ url_for('document.documents') }}"
               class="nav-item {% if request.endpoint == 'document.documents' %}active{% endif %}">
                <i class="bi bi-folder2-open"></i>
                <span>Documents</span>
            </a>

            <a href="{{ url_for('document.upload') }}"
               class="nav-item {% if request.endpoint == 'document.upload' %}active{% endif %}">
                <i class="bi bi-cloud-upload-fill"></i>
                <span>Upload</span>
            </a>

            <a href="{{ url_for('audit.audit_logs') }}"
               class="nav-item {% if request.endpoint == 'audit.audit_logs' %}active{% endif %}">
                <i class="bi bi-clock-history"></i>
                <span>Audit Logs</span>
            </a>

        </nav>

        <div class="sidebar-footer">
            <a href="{{ url_for('auth.logout') }}" class="nav-item">
                <i class="bi bi-box-arrow-right"></i>
                <span>Logout</span>
            </a>
        </div>

    </aside>

    <div class="app-main">

        <header class="topbar">
            <div class="d-flex align-items-center gap-3">
                <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle navigation">
                    <i class="bi bi-list"></i>
                </button>
               <span class="topbar-title">

    {{ self.title() }}

</span>
</div>
        </header>

        <main class="app-content">

            {% with messages = get_flashed_messages(with_categories=true) %}

                {% if messages %}

                    {% for category, message in messages %}

                        <div class="alert alert-{{ category }} alert-dismissible fade show">

                            {{ message }}

                            <button
                                class="btn-close"
                                data-bs-dismiss="alert">
                            </button>

                        </div>

                    {% endfor %}

                {% endif %}

            {% endwith %}

            {% block content %}
            {% endblock %}

        </main>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.getElementById('sidebarToggle')?.addEventListener('click', function () {
        document.getElementById('sidebar').classList.toggle('is-open');
    });
</script>

</body>

</html>
